<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Universo HQ — Login</title>

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;700&family=Playfair+Display:wght@700;900&family=Bangers&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/login.css">
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/616/616408.png">
</head>
<body>

  <!-- Orbs decorativos de fundo -->
  <div class="bg-layer"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Card de login -->
  <main class="login-card">

    <!-- Logo / ícone -->
    <div class="logo-badge">
      <i class="bi bi-shield-lock-fill"></i>
    </div>

    <!-- Títulos -->
    <h1 class="card-title">Bem-vindo</h1>
    <p class="card-subtitle">Faça login para continuar</p>
    <div class="gold-line"></div>

    <!-- Alerta de erro -->
    <div id="alertaErro" class="alert-erro" style="display:none;"></div>

    <!-- Formulário -->
    <form id="formLogin">

      <!-- Usuário -->
      <div class="input-box">
        <input
          type="text"
          id="username"
          placeholder="Digite seu usuário"
          autocomplete="username"
          required
        >
        <i class="bi bi-person-fill"></i>
      </div>

      <!-- Senha -->
      <div class="input-box">
        <input
          type="password"
          id="password"
          placeholder="Digite sua senha"
          autocomplete="current-password"
          required
        >
        <i class="bi bi-lock-fill"></i>
        <!-- Botão mostrar/ocultar senha -->
        <span class="toggle-senha" id="toggleSenha" title="Mostrar senha">
          <i class="bi bi-eye-slash" id="iconeSenha"></i>
        </span>
      </div>

      <!-- Botão entrar -->
      <button type="submit" class="btn-login" id="btnLogin">
        <span id="btnTexto">Entrar</span>
        <span id="btnLoader" style="display:none;">
          <i class="bi bi-arrow-repeat spin"></i> Aguarde...
        </span>
      </button>

    </form>

    <!-- Dica de credenciais (remover em produção) -->
    <div class="dicas-login">
      <p>🛡️ <strong>Admin:</strong> admin / admin123</p>
      <p>👤 <strong>Usuário:</strong> usuario / user123</p>
    </div>

    <!-- Link voltar ao site -->
    <p class="signup">
      <a class="signup-link" href="/">← Voltar ao site</a>
    </p>

  </main>

<script>
// ============================================================
// LOGIN — JavaScript do formulário
// ============================================================

const formLogin   = document.getElementById('formLogin');
const alertaErro  = document.getElementById('alertaErro');
const btnLogin    = document.getElementById('btnLogin');
const btnTexto    = document.getElementById('btnTexto');
const btnLoader   = document.getElementById('btnLoader');
const toggleSenha = document.getElementById('toggleSenha');
const inputSenha  = document.getElementById('password');
const iconeSenha  = document.getElementById('iconeSenha');

// Mostrar/ocultar senha
toggleSenha.addEventListener('click', () => {
  const visivel = inputSenha.type === 'text';
  inputSenha.type = visivel ? 'password' : 'text';
  iconeSenha.className = visivel ? 'bi bi-eye-slash' : 'bi bi-eye';
});

// Exibe mensagem de erro
function mostrarErro(msg) {
  alertaErro.textContent = msg;
  alertaErro.style.display = 'block';
}

// Alterna estado do botão durante a requisição
function setCarregando(estado) {
  btnLogin.disabled = estado;
  btnTexto.style.display = estado ? 'none' : 'inline';
  btnLoader.style.display = estado ? 'inline' : 'none';
}

// Submissão do formulário
formLogin.addEventListener('submit', async (e) => {
  e.preventDefault();
  alertaErro.style.display = 'none';

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  if (!username || !password) {
    mostrarErro('Preencha todos os campos.');
    return;
  }

  setCarregando(true);

  try {
    const resp = await fetch('/api/login', {
      method:      'POST',
      headers:     { 'Content-Type': 'application/json' },
      credentials: 'include',
      body:        JSON.stringify({ username, password })
    });

    const data = await resp.json();

    if (data.success) {
      // Redireciona para o destino indicado pelo backend
      window.location.href = data.redirectTo;
    } else {
      mostrarErro(data.message || 'Credenciais inválidas.');
      setCarregando(false);
    }
  } catch (err) {
    console.error('Erro no login:', err);
    mostrarErro('Erro de conexão com o servidor. Verifique se o servidor está rodando em http://localhost:3000');
    setCarregando(false);
  }
});
</script>
</body>
</html>
